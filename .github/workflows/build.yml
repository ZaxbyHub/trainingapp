name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~\AppData\Local\pip\Cache
            ~\AppData\Local\PyInstaller
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build executable
        run: python scripts/build.py
        timeout-minutes: 45
      
      - name: Test executable
        run: |
          dist/DocumentQAApp/DocumentQAApp.exe --help
      
      - name: Create installer
        run: |
          python -c "import shutil; shutil.make_archive('DocumentQAApp-windows', 'zip', 'dist/DocumentQAApp')"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DocumentQAApp-windows
          path: DocumentQAApp-windows.zip
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: DocumentQAApp-windows.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
