name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 1.2.3)'
        required: true
        type: string
      version_type:
        description: 'Version type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Validate inputs
        run: |
          # Validate version format (X.Y.Z)
          if [[ ! "${{ github.event.inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format. Expected: X.Y.Z (e.g., 1.2.3)"
            exit 1
          fi
          
          # Validate version_type
          case "${{ github.event.inputs.version_type }}" in
            patch|minor|major) echo "Valid version_type" ;;
            *) echo "Invalid version_type. Expected: patch, minor, or major"; exit 1 ;;
          esac
      
      - name: Bump version
        run: python scripts/version_bump.py ${{ github.event.inputs.version_type }}
      
      - name: Commit version bump
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Bump version to ${{ github.event.inputs.version }}"
          git tag v${{ github.event.inputs.version }}
          git push origin main && git push origin v${{ github.event.inputs.version }}
      
      - name: Trigger build workflow
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: build.yml
          ref: refs/tags/v${{ github.event.inputs.version }}
